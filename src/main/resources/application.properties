spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create

# datasource - values come from environment variables (see README)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rentACarBackend}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.properties.jakarta.persistence.validation.mode = none

# SQL initialization config - for loading test data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT Security Configuration - secret comes from environment, never commit it
app.auth.tokenSecret=${JWT_SECRET}
app.auth.tokenExpirationMsec=86400000

# swagger paths (enabled/disabled per profile)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# frontend configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# default to dev profile when none is set
spring.profiles.default=dev
